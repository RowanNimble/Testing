name: Hotfix Auto PR

on:
  push:
    branches:
      - "hotfix/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  create-hotfix-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Create or find PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          PR_URL=$(gh pr list \
            --head "$BRANCH_NAME" \
            --base main \
            --state open \
            --json url \
            --jq '.[0].url')

          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH_NAME" \
              --title "Hotfix: $BRANCH_NAME" \
              --body "Automatic hotfix PR from branch \`$BRANCH_NAME\`.")
          fi

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: |
          gh pr merge "$PR_URL" --auto --squash
